<div class="bg-[#191919] min-h-screen p-5 box-border">

  <!--Esto es una prueba solo para saber si el Tailwind se me habia instalado
  correctamente y comprobar su funcionamietno, no cumple ninguna funcion
  y tampoco es algo fundamental del programa-->
 <!--<h3 class="text-red-500 text-5xl">
    TAILWIND FUNCAAAA
  </h3>-->

  <h1 class="text-center text-[#00ff6e] text-[70px] bg-[#282828] p-5 rounded-[20px] shadow-[0_0_20px_rgb(0,255,110)] font-bold mb-4 max-md:text-[40px]">
    Buscador Rick & Morty
  </h1>

  <input
    [(ngModel)]="busqueda"
    (input)="buscar()"
    placeholder="Buscar personaje"
    class="text-white w-full p-[15px] mt-5 mb-[30px] border-none rounded-[15px] text-xl box-border"
  >

  <div class="grid grid-cols-4 gap-[25px] max-[1000px]:grid-cols-2 max-[600px]:grid-cols-1">

    @for (p of filtrados; track p.id) {

      <div class="bg-[#323232] rounded-[20px] p-[15px] text-center shadow-[5px_5px_20px_black] transition-transform duration-300 hover:scale-105">

        <img
          [src]="p.image"
          [alt]="p.name"
          class="w-full rounded-[15px]"
        >

        <h2 class="text-[#00ff6e] text-[28px] font-bold mt-2">
          {{ p.name }}
        </h2>

        <p class="text-white text-lg">
          {{ p.species }}
        </p>

      </div>

    }

  </div>

</div>
